<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>記事一覧｜教員コミュニティ ジーニー</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@500;700&family=Zen+Kaku+Gothic+New:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{--bg:#FBF8F2;--surface:#fff;--ink:#2c2a26;--muted:#6b665d;--line:#e7e1d6;--brand:#2f6db3;--brand-d:#234f86;--accent:#e0773c}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:"Zen Kaku Gothic New","Hiragino Maru Gothic ProN",sans-serif;color:var(--ink);background:var(--bg);line-height:1.9}
  a{color:inherit;text-decoration:none}
  h1,h2,h3{font-family:"Zen Maru Gothic","Hiragino Maru Gothic ProN",sans-serif}
  header{background:rgba(251,248,242,.92);backdrop-filter:blur(8px);border-bottom:1px solid var(--line);position:sticky;top:0;z-index:30}
  .nav{max-width:1120px;margin:0 auto;padding:0 20px;height:64px;display:flex;align-items:center;gap:18px}
  .logo{display:flex;align-items:center;gap:10px;font-family:"Zen Maru Gothic",sans-serif;font-weight:700;font-size:20px}
  .logo .mark{width:32px;height:32px;border-radius:9px;background:var(--brand);color:#fff;display:grid;place-items:center}
  .wrap{max-width:1120px;margin:0 auto;padding:36px 20px 60px}
  .wrap h1{font-size:28px;margin-bottom:6px}
  .count{color:var(--muted);font-size:14px;margin-bottom:18px}
  .filters{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:26px}
  .filters button{font-family:inherit;font-size:13px;border:1.5px solid var(--line);background:#fff;color:var(--muted);padding:7px 16px;border-radius:999px;cursor:pointer;transition:.15s}
  .filters button:hover{border-color:var(--accent);color:var(--accent)}
  .filters button.on{background:var(--accent);border-color:var(--accent);color:#fff}
  .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:22px}
  .card{background:var(--surface);border:1px solid var(--line);border-radius:16px;overflow:hidden;transition:transform .15s,box-shadow .15s}
  .card:hover{transform:translateY(-3px);box-shadow:0 10px 28px rgba(60,50,30,.08)}
  .card .thumb{height:150px;background:linear-gradient(135deg,#cfe0f3,#f3e6d3);overflow:hidden}
  .card .thumb img{width:100%;height:100%;object-fit:cover;display:block}
  .card .body{padding:15px 17px 19px}
  .tag{display:inline-block;font-size:11px;font-weight:700;color:var(--brand-d);background:#eaf1fa;padding:3px 10px;border-radius:999px}
  .card h3{font-size:16px;margin:10px 0 8px;line-height:1.5}
  .card .date{font-size:12px;color:var(--muted)}
  @media(max-width:820px){.grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<header><div class="nav"><a class="logo" href="index.html"><span class="mark">G</span>ジーニー</a></div></header>

<div class="wrap">
  <h1>記事一覧</h1>
  <div class="count" id="count"></div>
  <div class="filters" id="filters"></div>
  <div class="grid" id="grid"></div>
</div>

<script>
(function(){
  function esc(s){return (s||'').replace(/[&<>"]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];});}
  function card(p){
    var t=p.thumb?'<div class="thumb"><img src="'+p.thumb+'" alt="" loading="lazy"></div>':'<div class="thumb"></div>';
    return '<a class="card" href="post.html?slug='+encodeURIComponent(p.slug)+'">'+t+
      '<div class="body"><span class="tag">'+esc(p.category)+'</span><h3>'+esc(p.title)+'</h3>'+
      '<div class="date">'+(p.date||'').replace(/-/g,'.')+'</div></div></a>';
  }
  var ALL=[], cats=['すべて'];
  var initial=new URLSearchParams(location.search).get('cat')||'すべて';
  fetch('data/posts.json').then(function(r){return r.json();}).then(function(posts){
    ALL=posts;
    posts.forEach(function(p){if(cats.indexOf(p.category)<0)cats.push(p.category);});
    var fb=document.getElementById('filters');
    fb.innerHTML=cats.map(function(c){return '<button data-c="'+c+'">'+c+'</button>';}).join('');
    fb.querySelectorAll('button').forEach(function(b){b.onclick=function(){show(b.dataset.c);};});
    show(initial);
  });
  function show(cat){
    var list=(cat==='すべて')?ALL:ALL.filter(function(p){return p.category===cat;});
    document.getElementById('grid').innerHTML=list.map(card).join('');
    document.getElementById('count').textContent=list.length+' 件';
    document.querySelectorAll('#filters button').forEach(function(b){b.classList.toggle('on',b.dataset.c===cat);});
  }
})();
</script>
</body>
</html>
