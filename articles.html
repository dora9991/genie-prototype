<script>
(function(){
  var ALL=[], cats=['すべて'];
  var initial=new URLSearchParams(location.search).get('cat')||'すべて';
  fetch('data/posts.json').then(function(r){return r.json();}).then(function(posts){
    ALL=posts;
    posts.forEach(function(p){if(p.category && cats.indexOf(p.category)<0)cats.push(p.category);});
    var fb=document.getElementById('filters');
    fb.innerHTML=cats.map(function(c){return '<button data-c="'+GENIE.esc(c)+'">'+GENIE.esc(c)+'</button>';}).join('');
    fb.querySelectorAll('button').forEach(function(b){b.onclick=function(){show(b.dataset.c);history.replaceState(null,'',b.dataset.c==='すべて'?'articles.html':'articles.html?cat='+encodeURIComponent(b.dataset.c));};});
    show(cats.indexOf(initial)>=0?initial:'すべて');
  }).catch(function(e){document.getElementById('grid').innerHTML='<p class="empty">記事の読み込みに失敗しました。</p>';});
  function show(cat){
    var list=(cat==='すべて')?ALL:ALL.filter(function(p){return p.category===cat;});
    var g=document.getElementById('grid');
    g.innerHTML=list.length?list.map(GENIE.cardHTML).join(''):'<p class="empty">この カテゴリの記事はまだありません。</p>';
    document.getElementById('count').textContent=list.length+' 件';
    document.querySelectorAll('#filters button').forEach(function(b){b.classList.toggle('on',b.dataset.c===cat);});
    window.scrollTo({top:0});
  }
})();
</script>
