<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>記事｜教員コミュニティ ジーニー</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@500;700&family=Zen+Kaku+Gothic+New:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{--bg:#FBF8F2;--surface:#fff;--ink:#2c2a26;--muted:#6b665d;--line:#e7e1d6;--brand:#2f6db3;--brand-d:#234f86;--accent:#e0773c}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:"Zen Kaku Gothic New","Hiragino Maru Gothic ProN",sans-serif;color:var(--ink);background:var(--bg);line-height:1.95;letter-spacing:.015em}
  a{color:var(--brand);text-decoration:none}
  h1,h2,h3,h4{font-family:"Zen Maru Gothic","Hiragino Maru Gothic ProN",sans-serif;line-height:1.55}
  header{background:rgba(251,248,242,.92);backdrop-filter:blur(8px);border-bottom:1px solid var(--line);position:sticky;top:0;z-index:30}
  .nav{max-width:1120px;margin:0 auto;padding:0 20px;height:64px;display:flex;align-items:center;gap:18px}
  .logo{display:flex;align-items:center;gap:10px;font-family:"Zen Maru Gothic",sans-serif;font-weight:700;font-size:20px;color:var(--ink)}
  .logo .mark{width:32px;height:32px;border-radius:9px;background:var(--brand);color:#fff;display:grid;place-items:center}
  .nav .sp{margin-left:auto;font-size:14px}
  .article{max-width:760px;margin:0 auto;padding:34px 20px 60px}
  .back{font-size:14px;color:var(--muted)}
  .tag{display:inline-block;font-size:12px;font-weight:700;color:var(--brand-d);background:#eaf1fa;padding:4px 12px;border-radius:999px;margin:18px 0 10px}
  .article h1{font-size:30px;margin-bottom:10px;line-height:1.5}
  .meta{color:var(--muted);font-size:14px;border-bottom:1px solid var(--line);padding-bottom:18px;margin-bottom:24px}
  .body{font-size:16.5px}
  .body p{margin:0 0 1.2em}
  .body h2{font-size:23px;margin:1.8em 0 .7em;padding-left:12px;border-left:5px solid var(--accent)}
  .body h3{font-size:19px;margin:1.5em 0 .6em}
  .body img{max-width:100%;height:auto;border-radius:12px;margin:1em 0}
  .body ul,.body ol{margin:0 0 1.2em 1.4em}
  .body li{margin:.3em 0}
  .body blockquote{border-left:4px solid var(--brand);background:#f3f7fc;padding:12px 18px;border-radius:0 10px 10px 0;margin:1.2em 0;color:#3a4a5c}
  .body a{text-decoration:underline}
  .body figure{margin:1em 0}
  .wp-block-spacer{display:block}
  .marker-under-blue{background:linear-gradient(transparent 62%,#bfe0ff 62%)}
  .marker-under-red{background:linear-gradient(transparent 62%,#ffc7c7 62%)}
  .marker-under-yellow{background:linear-gradient(transparent 62%,#fff1a8 62%)}
  .marker-blue{background:#bfe0ff}.marker-red{background:#ffc7c7}.marker-yellow{background:#fff1a8}
  footer{background:#26241f;color:#cfc9bd;padding:30px 20px;text-align:center;font-size:13px}
</style>
</head>
<body>
<header><div class="nav"><a class="logo" href="index.html"><span class="mark">G</span>ジーニー</a><a class="sp" href="articles.html">記事一覧</a></div></header>

<article class="article">
  <a class="back" href="articles.html">← 記事一覧へ</a>
  <div id="content"><p style="color:var(--muted);margin-top:30px">読み込み中…</p></div>
  <p style="margin-top:40px"><a class="back" href="articles.html">← 記事一覧へ戻る</a></p>
</article>

<footer>© 2026 教員コミュニティ ジーニー（プロトタイプ）</footer>

<script>
(function(){
  var slug=new URLSearchParams(location.search).get('slug');
  fetch('data/posts.json').then(function(r){return r.json();}).then(function(posts){
    var p=posts.filter(function(x){return x.slug===slug;})[0]||posts[0];
    if(!p){document.getElementById('content').innerHTML='<p>記事が見つかりませんでした。</p>';return;}
    document.title=p.title+'｜教員コミュニティ ジーニー';
    document.getElementById('content').innerHTML=
      '<span class="tag">'+p.category+'</span>'+
      '<h1>'+p.title.replace(/&/g,'&amp;').replace(/</g,'&lt;')+'</h1>'+
      '<div class="meta">'+(p.date||'').replace(/-/g,'.')+'</div>'+
      '<div class="body">'+p.html+'</div>';
  });
})();
</script>
</body>
</html>
